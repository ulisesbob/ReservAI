<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0f0a;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: linear-gradient(135deg, #0a0f0a 0%, #0d1a12 40%, #0a0f0a 100%);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Background glow orbs */
  .orb1 {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(16,185,129,0.18) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    border-radius: 50%;
  }

  .orb2 {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    bottom: -100px;
    left: -100px;
    border-radius: 50%;
  }

  .orb3 {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
  }

  /* Grid lines subtle */
  .grid {
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(16,185,129,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(16,185,129,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 80px;
    width: 100%;
    height: 100%;
    justify-content: space-between;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    background: #10b981;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(16,185,129,0.8);
    animation: pulse 2s infinite;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: -0.3px;
  }

  .logo-text span {
    color: #10b981;
  }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 0;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 100px;
    padding: 8px 18px;
    margin-bottom: 36px;
    width: fit-content;
  }

  .tag-dot {
    width: 6px;
    height: 6px;
    background: #10b981;
    border-radius: 50%;
  }

  .tag-text {
    font-size: 13px;
    font-weight: 600;
    color: #10b981;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .headline {
    font-size: 88px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -4px;
    color: #fff;
    margin-bottom: 32px;
  }

  .headline .accent {
    background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .headline .small {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -2px;
    color: rgba(255,255,255,0.5);
  }

  .subtext {
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    max-width: 520px;
    line-height: 1.5;
  }

  .subtext strong {
    color: rgba(255,255,255,0.85);
    font-weight: 600;
  }

  /* Stats row */
  .stats {
    display: flex;
    gap: 0;
    margin-top: 48px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    padding-right: 40px;
    margin-right: 40px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .stat:last-child {
    border-right: none;
  }

  .stat-num {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -2px;
    color: #fff;
    line-height: 1;
  }

  .stat-num .unit {
    font-size: 24px;
    color: #10b981;
  }

  .stat-label {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
    font-weight: 500;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }

  .whatsapp-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(37, 211, 102, 0.1);
    border: 1px solid rgba(37, 211, 102, 0.25);
    border-radius: 100px;
    padding: 10px 22px;
  }

  .wa-icon {
    width: 20px;
    height: 20px;
    background: #25d366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }

  .wa-text {
    font-size: 14px;
    font-weight: 600;
    color: #25d366;
  }

  .cta-pill {
    background: linear-gradient(135deg, #10b981, #059669);
    border-radius: 100px;
    padding: 16px 36px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
    box-shadow: 0 0 40px rgba(16,185,129,0.4);
  }

  .url {
    font-size: 14px;
    color: rgba(255,255,255,0.25);
    font-weight: 500;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>
  <div class="grid"></div>

  <div class="content">
    <!-- Header -->
    <div class="header">
      <div class="logo-dot"></div>
      <div class="logo-text">Reservas<span>AI</span></div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="tag">
        <div class="tag-dot"></div>
        <span class="tag-text">Reservas inteligentes</span>
      </div>

      <div class="headline">
        Tu<br>
        <span class="accent">WhatsApp</span><br>
        <span class="small">llena mesas.</span>
      </div>

      <p class="subtext">
        Un agente de IA atiende reservas <strong>24/7</strong>.<br>
        Sin apps. Sin formularios. Sin perder llamadas.
      </p>

      <div class="stats">
        <div class="stat">
          <div class="stat-num">24<span class="unit">/7</span></div>
          <div class="stat-label">Disponible siempre</div>
        </div>
        <div class="stat">
          <div class="stat-num">3<span class="unit">seg</span></div>
          <div class="stat-label">Respuesta IA</div>
        </div>
        <div class="stat">
          <div class="stat-num">-40<span class="unit">%</span></div>
          <div class="stat-label">Menos no-shows</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="whatsapp-badge">
        <div class="wa-icon">●</div>
        <span class="wa-text">Reservas por WhatsApp</span>
      </div>
      <div class="cta-pill">Probá gratis 14 días →</div>
    </div>
  </div>
</div>
</body>
</html>
